scan_network:
  name: Scan Network
  description: Scan the local network for all i-Vent devices via UDP discovery.
  fields:
    subnet:
      name: Subnet prefix
      description: Network subnet prefix (e.g. 192.168.1)
      default: "192.168.1"
      example: "192.168.1"
      selector:
        text:
    start:
      name: Start IP
      description: First host IP to scan (1-254)
      default: 1
      selector:
        number:
          min: 1
          max: 254
    end:
      name: End IP
      description: Last host IP to scan (1-254)
      default: 254
      selector:
        number:
          min: 1
          max: 254
